<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جردد الاعداد للشركات والانشطه</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --primary: #6366f1; --accent: #fcdf06; --danger: #ef4444; --success: #22c55e;
            --card-bg: rgba(15, 23, 42, 0.9); --color-main-title: #ffffff;
            --color-header-h1: #ffffff; --color-header-p: #fcdf06;
            --color-table-headers: #a7f3d0; --color-company-names: #fcdf06;
            --color-numbers: #ffffff; --color-totals: #6366f1;
            --color-timer: #ff4d4d; --color-date: #ffffff; --color-summary-text: #f8fafc;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; min-height: 100vh; background-color: #0f172a; position: relative; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://img.pikbest.com/origin/10/12/37/0pIkbEsT6pIkbEsTTri.jpg!bwr800'); background-size: cover; background-position: center; filter: blur(15px); z-index: -2; transform: scale(1.1); opacity: 0.8; }
        
        .top-logo-area { position: absolute; top: 15px; right: 20px; z-index: 999; }
        .top-logo-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .container { max-width: 1300px; margin: auto; padding-bottom: 80px; position: relative; }
        .outer-title { color: var(--color-main-title); font-size: 1.5rem; font-weight: bold; margin-top: 20px; margin-bottom: 20px; text-align: center; width: 100%; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); }
        
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px; margin-top: 20px; margin-bottom: 30px; border-radius: 20px; position: relative; overflow: hidden; background-image: url('https://www.yemenmonitor.com/wp-content/uploads/2022/07/%D9%86-780x470.jpg'); background-size: cover; background-position: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-wrap: wrap; gap: 15px; }
        header::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.45); z-index: 1; }
        
        .header-left { background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--color-date); z-index: 2; position: relative; flex: 1; min-width: 200px; font-size: 0.9rem;}
        .header-right { z-index: 2; position: relative; flex: 1; min-width: 200px;}
        .header-right h1 { font-size: 1.4rem; margin: 5px 0; }
        .header-right p { color: var(--color-header-p); font-size: 3rem; font-weight: 900; margin: 0; text-shadow: 2px 2px 15px rgba(0,0,0,0.8); letter-spacing: 2px; }

        .month-selection-bar { background: var(--card-bg); padding: 12px; border-radius: 15px; border: 1px solid var(--accent); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; backdrop-filter: blur(10px); }
        .month-selection-bar select { background: #1e293b; color: white; border: 1px solid var(--primary); padding: 5px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .btn-main { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; backdrop-filter: blur(10px); font-size: 0.85rem; }
        
        .all-time-summary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 25px; display: flex; justify-content: space-around; backdrop-filter: blur(5px); flex-wrap: wrap; gap: 10px; }
        .stat-box { text-align: center; flex: 1; min-width: 120px; }
        .stat-box span { display: block; color: var(--accent); font-size: 1.3rem; font-weight: bold; }
        .stat-box label { color: #fff; font-size: 0.8rem; opacity: 0.8; }

        .glass-card { background: var(--card-bg); border-radius: 24px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); color: var(--color-summary-text); }
        
        .smart-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 600px) { .smart-comparison { grid-template-columns: 1fr; } }
        
        .summary-side { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; font-size: 0.9rem; }
        .summary-side h4 { color: #ff8c00; margin-bottom: 8px; } 
        .total-badge { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        
        .table-container { overflow-x: auto; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(255,255,255,0.05); color: var(--color-table-headers); padding: 10px; font-size: 0.9rem; }
        td { padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        
        .num-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: var(--color-numbers); padding: 8px; border-radius: 10px; text-align: center; width: 55px; font-weight: bold; font-size: 1rem; }
        .item-input { width: 100%; color: var(--color-company-names) !important; border: none !important; background: transparent !important; font-size: 1rem; font-weight: bold; text-align: right; }
        
        .goal-group { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 15px; min-width: 90px; border: 1px solid rgba(255,255,255,0.1); }
        .target-val { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .btn-s { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; }
        
        .status-badge { padding: 15px; border-radius: 18px; text-align: center; font-weight: bold; font-size: 1.1rem; margin-top: 10px; color: white; }
        .is-equal { background: linear-gradient(to right, #059669, #10b981); }
        .not-equal { background: linear-gradient(to right, #991b1b, #ef4444); }

        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(10px); padding: 10px; }
        .overlay-content { background: #ffffff; width: 100%; max-width: 1000px; padding: 25px; border-radius: 20px; color: #333; max-height: 95vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .charts-flex { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .charts-flex { grid-template-columns: 1fr; } }
        .chart-box { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; height: 350px; }
        .chart-box h4 { text-align: center; color: #1e293b; margin-top: 0; }
    </style>
</head>
<body>

<div class="top-logo-area">
    <img src="https://t3.ftcdn.net/jpg/16/58/74/54/360_F_1658745470_1EwySPwtYaPgTYbpByNrYq4XAwn5z14R.jpg" class="top-logo-img">
</div>

<div class="container">
    <div class="outer-title">جرد الاعداد للشركات والانشطهه </div>

    <header>
        <div class="header-right"><h1>جرد الشركات والأنشطه</h1><p>jhar</p></div>
        <div class="header-left"><div id="currentDate"></div><div>باقي على نهاية الشفتت : <span id="resetTimer">00:00:00</span></div></div>
    </header>

    <div class="month-selection-bar">
        <label style="color:white; font-size:0.9rem;">عرض جرد شهر:</label>
        <select id="activeMonth" onchange="switchMonth()">
            <option value="1">يناير</option><option value="2">فبراير</option><option value="3">مارس</option>
            <option value="4">أبريل</option><option value="5">مايو</option><option value="6">يونيو</option>
            <option value="7">يوليو</option><option value="8">أغسطس</option><option value="9">سبتمبر</option>
            <option value="10">أكتوبر</option><option value="11">نوفمبر</option><option value="12">ديسمبر</option>
        </select>
    </div>

    <div class="controls-grid">
        <button class="btn-main" onclick="addNewColumn()"><i class="fas fa-columns"></i> زيادة عمود</button>
        <button class="btn-main" onclick="addNewRow(1)"><i class="fas fa-building"></i> زيادة شركه</button>
        <button class="btn-main" onclick="addNewRow(2)"><i class="fas fa-tasks"></i> إضافة نشاط</button>
        <button class="btn-main" onclick="resetAllNumbers()"><i class="fas fa-eraser"></i> تصفير الأرقام</button>
        <button class="btn-main" style="background:var(--success)" onclick="manualSave()"><i class="fas fa-save"></i> حفظ يدوي</button>
        <button class="btn-main" style="border:1px solid var(--accent)" onclick="openAnalytics()"><i class="fas fa-chart-bar"></i> البار تشارت والارشيف</button>
    </div>

    <div class="all-time-summary">
        <div class="stat-box"><label>إجمالي الشركات التراكمي</label><span id="grandTotalComp">0</span></div>
        <div class="stat-box"><label>إجمالي الأنشطة التراكمي</label><span id="grandTotalAct">0</span></div>
    </div>

    <div class="glass-card">
        <div class="smart-comparison">
            <div class="summary-side"><h4>ملخص الشركات</h4><div id="sumList1"></div><div>الإجمالي: <span class="total-badge" id="totalDisplay1">0</span></div></div>
            <div class="summary-side"><h4>ملخص الأنشطة</h4><div id="sumList2"></div><div>الإجمالي: <span class="total-badge" id="totalDisplay2">0</span></div></div>
        </div>
        <div id="matchResult" class="status-badge not-equal">فانتظار البيانات...</div>
    </div>

    <div class="glass-card">
        <h3 style="color:var(--accent)">جدول الشركات</h3>
        <div class="table-container"><table id="table1"><thead id="thead1"><tr></tr></thead><tbody id="tbody1"></tbody><tfoot id="tfoot1"><tr id="sumRow1"></tr><tr id="goalRow1"></tr></tfoot></table></div>
    </div>

    <div class="glass-card">
        <h3 style="color:var(--accent)">جدول الأنشطة</h3>
        <div class="table-container"><table id="table2"><thead id="thead2"><tr></tr></thead><tbody id="tbody2"></tbody><tfoot id="tfoot2"><tr id="sumRow2"></tr><tr id="goalRow2"></tr></tfoot></table></div>
    </div>
</div>

<div id="analyticsOverlay" class="full-overlay">
    <div class="overlay-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h2 style="color:#1e293b; margin:0;">لوحة التحليلات</h2>
            <button onclick="closeAnalytics()" style="background:none; border:none; color:#333; font-size:2rem; cursor:pointer;">×</button>
        </div>
        <div class="charts-flex">
            <div class="chart-box"><h4>بار تشارت الشركات</h4><canvas id="chartComp"></canvas></div>
            <div class="chart-box"><h4>بار تشارت الأنشطة</h4><canvas id="chartAct"></canvas></div>
        </div>
    </div>
</div>

<script>
    let colCount = 3;
    let monthlyDB = JSON.parse(localStorage.getItem('jard_v3_db')) || {};
    let chartC = null, chartA = null;

    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const curMonth = new Date().getMonth() + 1;
        document.getElementById('activeMonth').value = curMonth;
        loadMonthData();
        setInterval(updateTimer, 1000);
    };

    function switchMonth() {
        if(confirm("عرض بيانات شهر آخر؟")) loadMonthData();
    }

    function autoSave() {
        const month = document.getElementById('activeMonth').value;
        monthlyDB[month] = {
            table1: getSnapshot(1),
            table2: getSnapshot(2),
            cols: colCount,
            goals: getGoals()
        };
        localStorage.setItem('jard_v3_db', JSON.stringify(monthlyDB));
        updateGrandTotals();
    }

    function manualSave() { autoSave(); alert("تم الحفظ!"); }

    function getSnapshot(sec) {
        return Array.from(document.querySelectorAll(`#tbody${sec} tr`)).map(r => ({
            name: r.querySelector('.item-input').value,
            vals: Array.from(r.querySelectorAll('.num-input')).map(i => i.value)
        }));
    }

    function getGoals() {
        let g = {};
        for(let s=1; s<=2; s++) {
            for(let c=1; c<=colCount; c++) {
                let el = document.getElementById(`gv${s}-${c}`);
                g[`${s}-${c}`] = el ? parseInt(el.innerText) : 40;
            }
        }
        return g;
    }

    function loadMonthData() {
        const month = document.getElementById('activeMonth').value;
        const data = monthlyDB[month];
        document.getElementById('tbody1').innerHTML = "";
        document.getElementById('tbody2').innerHTML = "";

        if(data) {
            colCount = data.cols;
            rebuildUI(data.goals);
            data.table1.forEach(r => addNewRow(1, r.name, r.vals));
            data.table2.forEach(r => addNewRow(2, r.name, r.vals));
        } else {
            colCount = 3; rebuildUI(null);
            ["Y", "S", "G", "T"].forEach(n => addNewRow(1, n));
            ["d", "B", "dd", "dd", "T", "d", "d"].forEach(n => addNewRow(2, n));
        }
        calculate();
        updateGrandTotals();
    }

    function rebuildUI(savedGoals) {
        [1,2].forEach(s => {
            document.getElementById("thead"+s).rows[0].innerHTML = `<th>اسم ${s==1?'الشركة':'النشاط'}</th>` + Array.from({length: colCount}, (_, i) => `<th>م${i+1}</th>`).join('') + `<th>المجموع</th>`;
            document.getElementById("sumRow"+s).innerHTML = `<td style="text-align:right">مجموع الأعمدة</td>` + Array.from({length: colCount}, (_, i) => `<td id="s${s}-${i+1}">0</td>`).join('') + `<td>-</td>`;
            
            let gr = document.getElementById("goalRow"+s);
            gr.innerHTML = `<td style="text-align:right">المتبقي من الجرد</td>`;
            for(let i=1; i<=colCount; i++) {
                let goalVal = savedGoals ? (savedGoals[`${s}-${i}`] || 40) : 40;
                gr.innerHTML += `<td><div class="goal-group"><div class="goal-controls"><button class="btn-s" onclick="updateGoal(${s},${i},-1)">-</button><span id="gv${s}-${i}" class="target-val">${goalVal}</span><button class="btn-s" onclick="updateGoal(${s},${i},1)">+</button></div><div class="remaining-box"><span id="r${s}-${i}" class="row-total">0</span></div></div></td>`;
            }
            gr.innerHTML += `<td>-</td>`;
        });
    }

    function calculate() {
        [1, 2].forEach(s => {
            let colSums = Array(colCount).fill(0);
            let tableTotal = 0;
            let summaryHTML = "";

            document.querySelectorAll(`#tbody${s} tr`).forEach(r => {
                let rSum = 0;
                r.querySelectorAll('.num-input').forEach((inp, idx) => {
                    let v = parseFloat(inp.value) || 0;
                    rSum += v; colSums[idx] += v;
                });
                r.cells[r.cells.length-1].innerText = rSum;
                tableTotal += rSum;
                let name = r.querySelector('.item-input').value;
                if(rSum > 0) summaryHTML += `<div>${name}: ${rSum}</div>`;
            });

            document.getElementById("sumList" + s).innerHTML = summaryHTML;
            document.getElementById("totalDisplay" + s).innerText = tableTotal;

            for(let i=1; i<=colCount; i++) {
                let sumCell = document.getElementById(`s${s}-${i}`);
                if(sumCell) sumCell.innerText = colSums[i-1];
                let goalEl = document.getElementById(`gv${s}-${i}`);
                let remEl = document.getElementById(`r${s}-${i}`);
                if(goalEl && remEl) {
                    let rem = parseInt(goalEl.innerText) - colSums[i-1];
                    remEl.innerText = rem;
                    remEl.style.color = rem === 0 ? "var(--success)" : (rem < 0 ? "var(--danger)" : "var(--color-totals)");
                }
            }
        });
        checkMatch();
        autoSave(); // حفظ تلقائي عند أي تغيير
    }

    function addNewRow(sec, name = "", vals = []) {
        let row = document.getElementById("tbody" + sec).insertRow();
        let html = `<td><input type="text" class="item-input" value="${name}" oninput="calculate()"></td>`;
        for(let i=0; i<colCount; i++) html += `<td><input type="number" class="num-input" value="${vals[i]||''}" oninput="calculate()"></td>`;
        row.innerHTML = html + `<td class="row-total" style="color:var(--primary); font-weight:bold">0</td>`;
    }

    function addNewColumn() { colCount++; rebuildUI(getGoals()); [1,2].forEach(s => { document.querySelectorAll(`#tbody${s} tr`).forEach(r => { let c = r.insertCell(r.cells.length-1); c.innerHTML = `<input type="number" class="num-input" oninput="calculate()">`; })}); calculate(); }
    function updateGoal(sec, col, amt) { let el = document.getElementById(`gv${sec}-${col}`); el.innerText = Math.max(0, parseInt(el.innerText) + amt); calculate(); }
    function checkMatch() {
        let t1 = parseInt(document.getElementById('totalDisplay1').innerText), t2 = parseInt(document.getElementById('totalDisplay2').innerText), m = document.getElementById("matchResult");
        if(t1 === t2 && t1 > 0) { m.innerText = "✅ متطابق: " + t1; m.className = "status-badge is-equal"; }
        else { m.innerText = "❌ مو متطابق | الفرق: " + Math.abs(t1-t2); m.className = "status-badge not-equal"; }
    }
    function updateGrandTotals() {
        let tc = 0, ta = 0;
        Object.values(monthlyDB).forEach(m => {
            m.table1.forEach(r => r.vals.forEach(v => tc += parseFloat(v)||0));
            m.table2.forEach(r => r.vals.forEach(v => ta += parseFloat(v)||0));
        });
        document.getElementById('grandTotalComp').innerText = tc;
        document.getElementById('grandTotalAct').innerText = ta;
    }
    function resetAllNumbers() { if(confirm("تصفير أرقام الجدول؟")) { document.querySelectorAll('.num-input').forEach(i => i.value = ""); calculate(); } }
    function openAnalytics() { document.getElementById('analyticsOverlay').style.display='flex'; showChart(); }
    function closeAnalytics() { document.getElementById('analyticsOverlay').style.display='none'; }
    function updateTimer() {
        const now = new Date(); const res = new Date(); res.setHours(23,0,0,0); if(now>res) res.setDate(res.getDate()+1);
        const d = res-now; const h = Math.floor(d/3600000).toString().padStart(2,'0'), m = Math.floor((d%3600000)/60000).toString().padStart(2,'0'), s = Math.floor((d%60000)/1000).toString().padStart(2,'0');
        document.getElementById('resetTimer').innerText = `${h}:${m}:${s}`;
    }
    function showChart() {
        const getData = (s) => {
            let l = [], v = [];
            document.querySelectorAll(`#tbody${s} tr`).forEach(r => {
                let n = r.querySelector('.item-input').value, val = parseInt(r.cells[r.cells.length-1].innerText) || 0;
                if(n) { l.push(n); v.push(val); }
            });
            return { l, v };
        };
        if(chartC) chartC.destroy(); if(chartA) chartA.destroy();
        let dc = getData(1), da = getData(2);
        chartC = new Chart(document.getElementById('chartComp'), { type: 'bar', data: { labels: dc.l, datasets: [{ label: 'الشركات', data: dc.v, backgroundColor: '#6366f1' }]}, options: { maintainAspectRatio: false }});
        chartA = new Chart(document.getElementById('chartAct'), { type: 'bar', data: { labels: da.l, datasets: [{ label: 'الأنشطة', data: da.v, backgroundColor: '#fcdf06' }]}, options: { maintainAspectRatio: false }});
    }
</script>
</body>
</html>
