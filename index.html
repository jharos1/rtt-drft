<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي البسيط</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>مرحباً بك في موقعي</h1>
        <nav>
            <ul>
                <li><a href="#about">من أنا</a></li>
                <li><a href="#services">خدماتي</a></li>
                <li><a href="#contact">تواصل معي</a></li>
            </ul>
        </nav>
    </header>
    
    <section id="about">
        <h2>من أنا</h2>
        <p>أنا مبتدئ في البرمجة وأتعلم إنشاء مواقع ويب بسيطة!</p>
    </section>
    
    <section id="services">
        <h2>خدماتي</h2>
        <ul>
            <li>تصميم مواقع بسيطة</li>
            <li>كتابة أكواد HTML و CSS</li>
            <li>تجربة JavaScript</li>
        </ul>
    </section>
    
    <section id="contact">
        <h2>تواصل معي</h2>
        <form>
            <label for="name">الاسم:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="message">رسالتك:</label>
            <textarea id="message" name="message" required></textarea>
            
            <button type="submit">إرسال</button>
        </form>
    </section>
    
    <footer>
        <p>حقوق النشر &copy; 2024. جميع الحقوق محفوظة.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
