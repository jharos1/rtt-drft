<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الجرد الاحترافي - الإصدار المطور</title>
    
    <style>
        :root { 
            --body-bg: #0f172a;
            --card-bg: #1e293b;
            --main-text: #f1f5f9;
            --item-name-color: #38bdf8; 
            --accent-purple: #818cf8;
            --input-glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; padding: 20px; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--body-bg); 
            color: var(--main-text); 
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: auto; }

        .glass-card { 
            background: var(--card-bg); 
            border-radius: 20px; padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- زر وقائمة الإعدادات --- */
        .settings-container { position: fixed; bottom: 30px; left: 30px; z-index: 9999; }
        .settings-btn { 
            background: var(--card-bg); border: 1px solid var(--item-name-color); 
            color: var(--item-name-color); width: 50px; height: 50px; 
            border-radius: 50%; cursor: pointer; font-size: 1.5rem;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }
        .settings-menu { 
            display: none; position: absolute; bottom: 60px; left: 0; 
            background: var(--card-bg); border: 1px solid #334155; 
            padding: 15px; border-radius: 15px; width: 200px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .settings-menu button { 
            width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; 
            border: none; cursor: pointer; font-weight: bold; background: var(--input-glass); color: white;
            transition: 0.3s;
        }
        .settings-menu button:hover { background: var(--item-name-color); color: #000; }

        /* --- الجداول --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; }

        .item-input {
            background: rgba(56, 189, 248, 0.07) !important;
            border: 1px solid rgba(56, 189, 248, 0.2) !important;
            color: var(--item-name-color) !important;
            font-weight: 800 !important; font-size: 1.1rem !important;
            text-align: right !important; padding-right: 15px !important;
            width: 95% !important;
        }

        .num-input { 
            background: var(--input-glass); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 12px; border-radius: 12px; text-align: center; 
            width: 80%; font-size: 1.1rem; font-weight: 600;
        }

        /* تمييز أرقام مجموع الأعمدة */
        .column-sum-highlight {
            font-size: 1.4rem !important;
            color: #fff !important;
            text-shadow: 0 0 10px var(--item-name-color);
            background: rgba(56, 189, 248, 0.1);
            padding: 5px 10px; border-radius: 8px;
        }

        .row-total { font-size: 1.2rem; font-weight: bold; color: var(--accent-purple); }

        .goal-group { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 12px; }
        .btn-s { background: #334155; border: none; color: white; width: 25px; height: 25px; border-radius: 6px; cursor: pointer; }

        .match-indicator { 
            text-align: center; padding: 18px; border-radius: 15px; margin-top: 20px;
            font-weight: bold; font-size: 1.3rem;
        }
        .is-equal { background: linear-gradient(to right, #065f46, #059669); color: white; }
        .not-equal { background: #450a0a; border: 1px solid #7f1d1d; color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: var(--item-name-color);">نظام الجرد والمطابقة الذكي</h1>
    </header>

    <div class="settings-container">
        <div class="settings-menu" id="sMenu">
            <button onclick="addNewRow(1)">+ إضافة صف للعلوي</button>
            <button onclick="addNewRow(2)">+ إضافة صف للسفلي</button>
            <button onclick="addNewColumn()">📊 إضافة عمود جديد</button>
            <button onclick="exportData()" style="background: #065f46;">💾 تصدير البيانات</button>
            <button onclick="location.reload()" style="background: #450a0a;">🧹 تصفير الجدول</button>
        </div>
        <button class="settings-btn" onclick="toggleMenu()">⚙️</button>
    </div>

    <div class="glass-card">
        <h3>📊 ملخص الحالة</h3>
        <div style="display: flex; gap: 20px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px solid var(--accent-purple);">
            <div style="flex: 1; text-align: center;">
                <h4 style="color: var(--accent-purple);">إجمالي العلوي</h4>
                <b id="totalDisplay1" style="font-size: 2rem;">0</b>
            </div>
            <div style="width: 2px; background: rgba(129,140,248,0.2);"></div>
            <div style="flex: 1; text-align: center;">
                <h4 style="color: var(--accent-purple);">إجمالي السفلي</h4>
                <b id="totalDisplay2" style="font-size: 2rem;">0</b>
            </div>
        </div>
        <div id="matchResult" class="match-indicator not-equal">بانتظار البيانات...</div>
    </div>

    <div class="glass-card">
        <h3 style="color:var(--item-name-color);">📦 بيانات القسم العلوي</h3>
        <table id="table1">
            <thead id="thead1">
                <tr>
                    <th style="width: 30%; text-align: right;">اسم السلعة</th>
                    <th>م1</th><th>م2</th><th>م3</th><th>م4</th><th>المجموع</th>
                </tr>
            </thead>
            <tbody id="tbody1"></tbody>
            <tfoot id="tfoot1">
                <tr style="color: var(--item-name-color); font-weight: bold;">
                    <td style="text-align:right;">مجموع الأعمدة</td>
                    <td><span id="s1-1" class="column-sum-highlight">0</span></td>
                    <td><span id="s1-2" class="column-sum-highlight">0</span></td>
                    <td><span id="s1-3" class="column-sum-highlight">0</span></td>
                    <td><span id="s1-4" class="column-sum-highlight">0</span></td>
                    <td>-</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="glass-card">
        <h3 style="color:var(--item-name-color);">📦 بيانات القسم السفلي</h3>
        <table id="table2">
            <thead id="thead2">
                <tr>
                    <th style="width: 30%; text-align: right;">اسم السلعة</th>
                    <th>م5</th><th>م6</th><th>م7</th><th>م8</th><th>المجموع</th>
                </tr>
            </thead>
            <tbody id="tbody2"></tbody>
            <tfoot id="tfoot2">
                <tr style="color: var(--item-name-color); font-weight: bold;">
                    <td style="text-align:right;">مجموع الأعمدة</td>
                    <td><span id="s2-1" class="column-sum-highlight">0</span></td>
                    <td><span id="s2-2" class="column-sum-highlight">0</span></td>
                    <td><span id="s2-3" class="column-sum-highlight">0</span></td>
                    <td><span id="s2-4" class="column-sum-highlight">0</span></td>
                    <td>-</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    let colCount = 4; // عدد أعمدة البيانات الأساسي

    function toggleMenu() {
        const m = document.getElementById('sMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function addNewRow(sec, name = "سلعة جديدة") {
        const tbody = document.getElementById("tbody" + sec);
        const row = tbody.insertRow();
        let cells = `<td><input type="text" class="num-input item-input" value="${name}" oninput="calculate()"></td>`;
        for (let i = 0; i < colCount; i++) {
            cells += `<td><input type="number" class="num-input" placeholder="0" oninput="calculate()"></td>`;
        }
        cells += `<td class="row-total">0</td>`;
        row.innerHTML = cells;
        calculate();
    }

    function addNewColumn() {
        colCount++;
        // تحديث الهيدر للجدولين
        for (let s = 1; s <= 2; s++) {
            const headerRow = document.getElementById(`thead${s}`).rows[0];
            const newTh = document.createElement('th');
            newTh.innerText = 'م' + (s === 1 ? colCount : colCount + 4);
            headerRow.insertBefore(newTh, headerRow.cells[headerRow.cells.length - 1]);

            // تحديث الصفوف الموجودة
            const rows = document.getElementById(`tbody${s}`).rows;
            for (let row of rows) {
                const newCell = row.insertCell(row.cells.length - 1);
                newCell.innerHTML = `<input type="number" class="num-input" placeholder="0" oninput="calculate()">`;
            }

            // تحديث الفوتر (المجاميع)
            const footerRow = document.getElementById(`tfoot${s}`).rows[0];
            const newTd = footerRow.insertCell(footerRow.cells.length - 1);
            newTd.innerHTML = `<span id="s${s}-${colCount}" class="column-sum-highlight">0</span>`;
        }
        calculate();
    }

    function calculate() {
        let totals = [0, 0];
        for (let s = 1; s <= 2; s++) {
            const rows = document.getElementById("tbody" + s).rows;
            let cSums = Array(colCount).fill(0);
            let tTotal = 0;

            for (let i = 0; i < rows.length; i++) {
                const inputs = rows[i].getElementsByTagName("input");
                let rSum = 0;
                for (let j = 1; j <= colCount; j++) {
                    let val = parseFloat(inputs[j].value) || 0;
                    rSum += val;
                    cSums[j-1] += val;
                }
                rows[i].cells[colCount + 1].innerText = rSum;
                tTotal += rSum;
            }
            
            for (let k = 1; k <= colCount; k++) {
                document.getElementById(`s${s}-${k}`).innerText = cSums[k-1];
            }
            document.getElementById("totalDisplay" + s).innerText = tTotal;
            totals[s-1] = tTotal;
        }

        const m = document.getElementById("matchResult");
        if (totals[0] === totals[1] && totals[0] !== 0) {
            m.innerText = "✅ مطابق تماماً | الإجمالي: " + totals[0];
            m.className = "match-indicator is-equal";
        } else {
            m.innerText = "⚠️ غير مطابق | الفرق: " + Math.abs(totals[0] - totals[1]);
            m.className = "match-indicator not-equal";
        }
    }

    function exportData() {
        let text = "تقرير الجرد:\n";
        text += "إجمالي العلوي: " + document.getElementById('totalDisplay1').innerText + "\n";
        text += "إجمالي السفلي: " + document.getElementById('totalDisplay2').innerText + "\n";
        alert("تم نسخ الملخص، يمكنك الآن طباعة الصفحة أو حفظها كـ PDF");
        window.print();
    }

    window.onload = function() {
        ["أرز", "سكر", "زيت"].forEach(n => addNewRow(1, n));
        ["لحم", "دجاج", "سمك"].forEach(n => addNewRow(2, n));
    };
</script>
</body>
</html>
